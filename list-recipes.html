<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>List | Recipes</title>
</head>  
<body class="body-meals" onload="getRecipeList()">

    <div class="header">
        <a href="index.html">
            <img class="left-arrow" src="icons/1904658-arrow-arrow-left-change-direction-left-next-undo_122508.png" alt="">
        </a>
        <img class="logo-text" src="images/logo-text.png" alt="">

    </div>

    <div id="meals">

        <div class="meals-list" id="output">

           


        </div>       
          
    </div>



    <script>

        var category = getCategory();

        function getRecipeList(){
            var rootPath = "https://mysite.itvarsity.org/api/recipe-book/";
            var fullPath = rootPath + "get-recipes/?category=" + category;

           fetch(fullPath)
            .then(function(response){
                return response.json();
            })
            .then(function(data){
                var output = "";
                for(a=0; a < data.length; a++){
                    output += `
                                <a href="show-recipe.html?id=${data[a].id}"/>
                                    <div class="meals-list-item">
                                        <img src="icons/1904671-arrow-arrow-right-change-direction-next-page-right_122521.png" alt="">
                                        <h1>${data[a].title}</h1>
                                        <p>${data[a].description}</p>
                                    </div>                                
                                </a>                                                                           
                            `;

                    // console.log("ID:" + data[a].id);
                    // console.log("title:" + data[a].title);
                    // console.log("description:" + data[a].description);
                }
                document.getElementById("output").innerHTML = output;

            })
        }


        function getCategory(){
            var url = window.location.href;
            var pos = url.search("=");
            var category = url.slice(pos + 1);


            return category;

        }




    </script>




</body>
</html>
